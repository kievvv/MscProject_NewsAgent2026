<!-- Chat Widget Component -->
<div id="chat-widget" class="chat-widget">
    <!-- Chat Button -->
    <button id="chat-widget-btn" class="chat-widget-btn" title="打开AI助手">
        <svg class="chat-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <svg class="close-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
    </button>

    <!-- Chat Panel -->
    <div id="chat-widget-panel" class="chat-widget-panel">
        <!-- Header -->
        <div class="chat-widget-header">
            <div class="chat-widget-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <span>Agent 研究助手</span>
            </div>
            <button class="chat-widget-close" title="最小化">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>

        <!-- Messages Container -->
        <div id="chat-widget-messages" class="chat-widget-messages">
            <!-- Welcome Message -->
            <div class="chat-message assistant">
                <div class="message-avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                </div>
                <div class="message-content">
                    <p>你好，我会先理解你的任务，再自动串起搜索、分析和报告：</p>
                    <ul>
                        <li>🧭 推荐适合你的新闻</li>
                        <li>📘 解读当前市场局势</li>
                        <li>📝 生成个性化简报</li>
                        <li>💬 连续研究与追问</li>
                    </ul>
                    <p>有什么我可以帮你的吗？</p>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="chat-widget-quick-actions">
            <button class="quick-action-btn" data-action="daily">📝 个性化简报</button>
            <button class="quick-action-btn" data-action="trending">📘 市场局势</button>
            <button class="quick-action-btn" data-action="alpha">🧭 高波动机会</button>
        </div>

        <!-- Input Area -->
        <div class="chat-widget-input-area">
            <textarea
                id="chat-widget-input"
                class="chat-widget-input"
                placeholder="输入消息...按Enter发送，Shift+Enter换行"
                rows="1"
            ></textarea>
            <button id="chat-widget-send" class="chat-widget-send-btn" title="发送">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>

        <!-- Footer -->
        <div class="chat-widget-footer">
            <a href="/chat" class="chat-widget-fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9"/>
                    <polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
                全屏模式
            </a>
        </div>
    </div>
</div>
